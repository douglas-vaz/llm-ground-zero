<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2330"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.62" r="0.55">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#79bbff"/>
      <stop offset="1" stop-color="#388bfd"/>
    </linearGradient>
    <linearGradient id="barOrange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e3b341"/>
      <stop offset="1" stop-color="#c08c1d"/>
    </linearGradient>
    <linearGradient id="barPurple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d2a8ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
  </defs>

  <!-- Big Sur rounded-square plate -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#glow)"/>
  <rect x="104" y="104" width="816" height="816" rx="181" fill="none"
        stroke="#30363d" stroke-width="8" opacity="0.6"/>

  <!-- bars: usage rising from the ground -->
  <rect x="296" y="540" width="116" height="180" rx="34" fill="url(#barOrange)"/>
  <rect x="454" y="380" width="116" height="340" rx="34" fill="url(#barBlue)"/>
  <rect x="612" y="470" width="116" height="250" rx="34" fill="url(#barPurple)"/>

  <!-- ground line (the "ground zero") -->
  <rect x="268" y="762" width="488" height="34" rx="17" fill="#3d444d"/>

  <!-- memory spark above the tallest bar -->
  <circle cx="512" cy="300" r="34" fill="#3fb950"/>
  <circle cx="512" cy="300" r="56" fill="none" stroke="#3fb950"
          stroke-width="10" opacity="0.45"/>
</svg>
